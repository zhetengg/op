name: OpenWrt_J4125_PassWall2_Optimize
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space (critical for 14GB limit)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
        sudo rm -rf /usr/share/swift /usr/share/rust /usr/local/.ghcup /opt/* || true
        sudo docker image prune -af || true
        sudo apt clean
        sudo rm -rf /usr/local/share/boost /usr/share/doc /usr/share/man || true
        df -h

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils python3-setuptools rsync unzip wget curl bc time

    - name: Clone OpenWrt (coolsnowwolf/lede)
      run: |
        git clone --depth=1 https://github.com/coolsnowwolf/lede openwrt

    - name: Prepare source (manual clone plugins)
      working-directory: openwrt
      run: |
        git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall2 package/luci-app-passwall2 || true
        git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall-packages package/passwall_packages || true
        git clone --depth=1 https://github.com/jerrykuku/luci-theme-argon package/luci-theme-argon || true
        git clone --depth=1 https://github.com/lisaac/luci-lib-docker package/luci-lib-docker || true
        git clone --depth=1 https://github.com/lisaac/luci-app-dockerman package/luci-app-dockerman || true

    - name: Update feeds & Generate config
      working-directory: openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        cat > .config << 'EOF'
        CONFIG_TARGET_x86=y
        CONFIG_TARGET_x86_64=y
        CONFIG_TARGET_x86_64_Generic=y
        CONFIG_TARGET_OPTIMIZATION="-O2 -pipe -march=x86-64-v2"
        CONFIG_X86_64_AESNI=y
        CONFIG_TARGET_KERNEL_PARTSIZE=256
        CONFIG_TARGET_ROOTFS_PARTSIZE=20480
        CONFIG_TARGET_IMAGES_GZ=y
        CONFIG_GRUB_EFI_IMAGES=y
        CONFIG_PACKAGE_luci-app-passwall2=y
        CONFIG_PACKAGE_luci-theme-argon=y
        CONFIG_PACKAGE_luci-app-dockerman=y
        CONFIG_PACKAGE_luci-lib-docker=y
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_curl=y
        CONFIG_PACKAGE_wget=y
        CONFIG_PACKAGE_htop=y
        CONFIG_PACKAGE_nano=y
        EOF
        sed -i 's/CONFIG_TARGET_KERNEL_PARTSIZE=.*/CONFIG_TARGET_KERNEL_PARTSIZE=256/' .config
        sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=20480/' .config
        sed -i '/lan)/,/;;/ s/192\.168\.1\.1/192.168.5.1/g' package/base-files/files/bin/config_generate
        make defconfig

    - name: Clean before compile (aggressive to avoid 14GB limit)
      working-directory: openwrt
      run: |
        rm -rf tmp/ staging_dir/target-*/root-x86/* build_dir/target-*/linux-x86_64/tmp/* build_dir/target-*/linux-x86_64/image/* 2>/dev/null || true
        find dl -size -1024c -delete || true
        rm -rf dl/*.crate dl/rust* dl/go* 2>/dev/null || true
        df -h

    - name: Download & Compile
      working-directory: openwrt
      run: |
        make download -j4
        make -j4 V=s || make -j1 V=s

    - name: Organize files
      working-directory: openwrt
      run: |
        mkdir -p bin/targets/x86/64/firmware
        mv bin/targets/x86/64/*combined-efi.img.gz bin/targets/x86/64/firmware/ 2>/dev/null || true
        echo "STRRP_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: Upload Artifact
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_J4125_PassWall2_${{ env.STRRP_DATE }}
        path: openwrt/bin/targets/x86/64/firmware/*

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: openwrt/bin/targets/x86/64/firmware/*
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ### J4125 专用 OpenWrt 优化版
          - 默认 IP: 192.168.5.1
          - 分区: 256MB Boot / 20GB Root (适合 Docker)
          - 优化: AES-NI, x86-64-v2
          - 组件: PassWall2, Argon Theme, Dockerman
