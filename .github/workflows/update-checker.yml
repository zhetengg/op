name: OpenWrt x86_64 J4125 (Full Version - With AdGuardHome & PassWall2)

on:
  workflow_dispatch:   # 手动触发
  push:
    tags:
      - '*'            # 任意 tag 触发自动构建 + Release

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # 需要完整历史来生成 Release notes

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
        sudo rm -rf /usr/share/swift /usr/share/rust /usr/local/.ghcup /opt/* || true
        sudo docker image prune -af || true
        sudo apt clean
        df -h

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils python3-setuptools rsync unzip wget curl

    - name: Clone OpenWrt (Lean LEDE)
      run: |
        git clone --depth=1 https://github.com/coolsnowwolf/lede openwrt

    - name: Prepare source
      working-directory: openwrt
      run: |
        # PassWall2 主包
        git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall2 package/luci-app-passwall2
        
        # PassWall2 依赖包（强烈推荐，防止 core/协议缺失）
        git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall-packages package/passwall_packages
        
        # 其他你原有的包
        git clone --depth=1 https://github.com/jerrykuku/luci-theme-argon package/luci-theme-argon
        git clone --depth=1 https://github.com/lisaac/luci-lib-docker package/luci-lib-docker
        git clone --depth=1 https://github.com/lisaac/luci-app-dockerman package/luci-app-dockerman
        git clone --depth=1 https://github.com/kiddin9/luci-app-adguardhome package/luci-app-adguardhome
        
        # 去除编译警告（常见修复）
        sed -i 's/-Werror//g' include/package.mk
        sed -i 's/-Werror//g' package/libs/libselinux/Makefile || true

    - name: Update feeds & Generate config
      working-directory: openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        cat > .config << 'EOF'
        CONFIG_TARGET_x86=y
        CONFIG_TARGET_x86_64=y
        CONFIG_TARGET_x86_64_Generic=y

        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-theme-argon=y
        
        # PassWall2 相关（核心 + 常见依赖）
        CONFIG_PACKAGE_luci-app-passwall2=y
        CONFIG_PACKAGE_passwall2=y                  # 如果有独立包名，视情况加
        # 可选：选择核心（xray / sing-box 等，通常默认拉取）
        # CONFIG_PACKAGE_xray-core=y
        # CONFIG_PACKAGE_sing-box=y

        # Docker 全家桶 + 修复依赖（保持原样）
        CONFIG_PACKAGE_docker=y
        CONFIG_PACKAGE_docker-ce=y
        CONFIG_PACKAGE_dockerd=y
        CONFIG_PACKAGE_containerd=y
        CONFIG_PACKAGE_runc=y
        CONFIG_PACKAGE_luci-app-dockerman=y
        CONFIG_PACKAGE_luci-lib-docker=y
        
        CONFIG_PACKAGE_kmod-nft-core=y
        CONFIG_PACKAGE_kmod-nft-fib=y
        CONFIG_PACKAGE_kmod-nft-nat=y
        CONFIG_PACKAGE_kmod-nft-offload=y
        CONFIG_PACKAGE_kmod-ipt-physdev=y
        CONFIG_PACKAGE_kmod-nf-ipvs=y
        CONFIG_PACKAGE_kmod-veth=y
        CONFIG_PACKAGE_kmod-nf-nat=y
        CONFIG_PACKAGE_kmod-nf-conntrack=y
        CONFIG_PACKAGE_kmod-nft-compat=y

        # udpxy
        CONFIG_PACKAGE_udpxy=y
        
        # AdGuardHome（保持原样）
        CONFIG_PACKAGE_adguardhome=y
        CONFIG_PACKAGE_luci-app-adguardhome=y

        CONFIG_PACKAGE_curl=y
        CONFIG_PACKAGE_wget=y
        EOF

        make defconfig

        # 额外清理（可选，避免 ruby 等冲突）
        echo "CONFIG_PACKAGE_ruby=n" >> .config
        make defconfig

    - name: Download & Clean
      working-directory: openwrt
      run: |
        make download -j1
        find dl -size -1024c -delete
        df -h

    - name: Compile
      working-directory: openwrt
      run: |
        make -j1 V=s   # 第一次建议单线程，成功后再改多线程

    # 自动 Release（tag 触发）
    - name: Create Release & Upload Firmware
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        FIRMWARE_PATH="openwrt/bin/targets/x86/64/*.img.gz"
        
        gh release create "$TAG_NAME" $FIRMWARE_PATH \
          --title "OpenWrt x86_64 J4125 - $TAG_NAME (PassWall2 + AdGuardHome)" \
          --notes "Automated build from tag $TAG_NAME (Lean LEDE + PassWall2 + Dockerman + AdGuardHome + Argon)" \
          --draft=false --prerelease=false

    - name: Upload Artifact (Manual Trigger Only)
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-x86_64-Full-PassWall2
        path: openwrt/bin/targets/x86/64/*.img.gz